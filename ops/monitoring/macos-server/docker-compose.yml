services:
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE}
      - --web.listen-address=0.0.0.0:9090
      - --web.enable-lifecycle
    volumes:
      - ./.rendered/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./.rendered/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - ./targets:/etc/prometheus/file_sd:ro
      - ./data/prometheus:/prometheus
    ports:
      - ${STACK_BIND_ADDRESS}:${PROMETHEUS_PORT}:9090
    depends_on:
      - alertmanager
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  alertmanager:
    image: ${ALERTMANAGER_IMAGE}
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.listen-address=0.0.0.0:9093
      - --cluster.listen-address=
    volumes:
      - ./.rendered/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/alertmanager
    ports:
      - ${STACK_BIND_ADDRESS}:${ALERTMANAGER_PORT}:9093
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  grafana:
    image: ${GRAFANA_IMAGE}
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/macos-self-monitoring.json
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - ${STACK_BIND_ADDRESS}:${GRAFANA_PORT}:3000
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
