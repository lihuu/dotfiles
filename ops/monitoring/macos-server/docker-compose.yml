services:
  bark-bridge:
    image: python:3.12-alpine
    restart: unless-stopped
    command:
      - python
      - /app/bridges/bark_webhook_bridge.py
    environment:
      BARK_SERVER_URL: ${BARK_SERVER_URL:-https://api.day.app}
      BARK_DEVICE_KEY: ${BARK_DEVICE_KEY:-}
      BARK_GROUP: ${BARK_GROUP:-Prometheus Alerts}
      BARK_SOUND: ${BARK_SOUND:-}
      BARK_ICON: ${BARK_ICON:-}
      BARK_URL: ${BARK_URL:-}
      BARK_LEVEL: ${BARK_LEVEL:-active}
      BARK_AUTOMATIC_COPY: ${BARK_AUTOMATIC_COPY:-0}
      BARK_IS_ARCHIVE: ${BARK_IS_ARCHIVE:-1}
      BARK_BRIDGE_PORT: ${BARK_BRIDGE_PORT:-18080}
      BARK_BRIDGE_BIND_ADDRESS: 0.0.0.0
    volumes:
      - ./:/app:ro
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE}
      - --web.listen-address=0.0.0.0:9090
      - --web.enable-lifecycle
    volumes:
      - ./.rendered/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./.rendered/docker/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - ./.rendered/docker/node_exporters.yml:/etc/prometheus/file_sd/node_exporters.yml:ro
      - ./data/prometheus:/prometheus
    ports:
      - ${PROMETHEUS_BIND_ADDRESS}:${PROMETHEUS_PORT}:9090
    depends_on:
      - bark-bridge
      - alertmanager
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  alertmanager:
    image: ${ALERTMANAGER_IMAGE}
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.listen-address=0.0.0.0:9093
      - --cluster.listen-address=
    volumes:
      - ./.rendered/docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/alertmanager
    ports:
      - ${ALERTMANAGER_BIND_ADDRESS}:${ALERTMANAGER_PORT}:9093
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  grafana:
    image: ${GRAFANA_IMAGE}
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/macos-self-monitoring.json
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - ${GRAFANA_BIND_ADDRESS}:${GRAFANA_PORT}:3000
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
