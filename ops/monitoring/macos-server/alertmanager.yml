global:
  resolve_timeout: 5m

route:
  receiver: ${ALERTMANAGER_DEFAULT_RECEIVER}
  group_by: ["alertname", "instance", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  # 默认空接收器：未配置 Bark / Telegram 时仍能让 Alertmanager 正常启动。
  - name: default-null

  # 组合接收器模板。
  # Bark 通过本地 bridge 接收 Alertmanager webhook，然后转成 Bark API 请求。
  - name: ops-default
    webhook_configs:
      - url: "${BARK_WEBHOOK_URL_EFFECTIVE}"
        send_resolved: true

    # Telegram 走 Alertmanager 原生 telegram_configs。
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN_EFFECTIVE}"
        chat_id: ${TELEGRAM_CHAT_ID_EFFECTIVE}
        send_resolved: true
        message: |
          [${MONITORED_HOSTNAME}] {{ .Status | toUpper }} - {{ .CommonLabels.alertname }}
          {{ range .Alerts -}}
          summary={{ .Annotations.summary }}
          description={{ .Annotations.description }}
          severity={{ .Labels.severity }}
          {{ end }}
