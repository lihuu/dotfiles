global:
  scrape_interval: ${PROMETHEUS_SCRAPE_INTERVAL}
  evaluation_interval: ${PROMETHEUS_EVALUATION_INTERVAL}
  external_labels:
    monitored_host: ${MONITORED_HOSTNAME}
    monitored_role: macos-self

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - ${ALERTMANAGER_LISTEN_ADDRESS}:${ALERTMANAGER_PORT}

rule_files:
  - ${PROMETHEUS_RULES_DEST}

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - ${PROMETHEUS_LISTEN_ADDRESS}:${PROMETHEUS_PORT}

  - job_name: node_exporter
    static_configs:
      - targets:
          - ${NODE_EXPORTER_LISTEN_ADDRESS}:${NODE_EXPORTER_PORT}

  - job_name: alertmanager
    static_configs:
      - targets:
          - ${ALERTMANAGER_LISTEN_ADDRESS}:${ALERTMANAGER_PORT}
