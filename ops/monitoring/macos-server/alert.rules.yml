groups:
  - name: macos-self-monitoring
    rules:
      # CPU 使用率 = 100 - 最近 5 分钟 idle CPU 平均占比。
      - alert: HighCPUUsage
        expr: |
          (
            100 - (
              avg by (instance) (
                rate(node_cpu_seconds_total{job="node_exporter", mode="idle"}[5m])
              ) * 100
            )
          ) > ${CPU_ALERT_THRESHOLD}
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率持续过高"
          description: "实例 {{ $labels.instance }} 的 CPU 使用率在过去 5 分钟持续高于 ${CPU_ALERT_THRESHOLD}% 。"

      # macOS 下没有 Linux 常见的 MemAvailable。
      # 这里兼容两类主机：
      # 1. Linux: 优先使用 MemAvailable / MemTotal
      # 2. macOS: 使用 (active + wired + compressed) / total 近似已占用内存
      - alert: HighMemoryUsage
        expr: |
          (
            (
              100 * (
                1 - (
                  node_memory_MemAvailable_bytes{job="node_exporter"}
                  /
                  node_memory_MemTotal_bytes{job="node_exporter"}
                )
              )
            )
            or
            (
              100 * (
                (
                  node_memory_active_bytes{job="node_exporter"} +
                  node_memory_wired_bytes{job="node_exporter"} +
                  node_memory_compressed_bytes{job="node_exporter"}
                ) / node_memory_total_bytes{job="node_exporter"}
              )
            )
          ) > ${MEM_ALERT_THRESHOLD}
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存压力持续过高"
          description: "实例 {{ $labels.instance }} 的近似内存使用率在过去 5 分钟持续高于 ${MEM_ALERT_THRESHOLD}% 。macOS 分支使用 (active + wired + compressed) / total 估算。"

      # macOS 新版 APFS 常见两种情况：
      # 1. mountpoint="/" 是只读系统卷
      # 2. 可写数据卷在 /System/Volumes/Data
      # Linux 通常直接使用 "/"。因此这里统一同时匹配三类挂载点。
      - alert: DiskSpaceLow
        expr: |
          min by (instance) (
            (
              node_filesystem_avail_bytes{
                job="node_exporter",
                mountpoint=~"/|/System/Volumes/Data|/System/Volumes/Data/",
                fstype!~"autofs|devfs|proc|tmpfs|overlay"
              }
              /
              node_filesystem_size_bytes{
                job="node_exporter",
                mountpoint=~"/|/System/Volumes/Data|/System/Volumes/Data/",
                fstype!~"autofs|devfs|proc|tmpfs|overlay"
              }
            ) * 100
          ) < ${DISK_ALERT_THRESHOLD}
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘剩余空间不足"
          description: "实例 {{ $labels.instance }} 的根卷/数据卷剩余空间低于 ${DISK_ALERT_THRESHOLD}% 并持续 5 分钟。"

      # up == 0 表示 Prometheus 无法成功抓取 node_exporter。
      - alert: HostExporterDown
        expr: up{job="node_exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "node_exporter 无法抓取"
          description: "Prometheus 连续 2 分钟无法抓取 {{ $labels.instance }} 上的 node_exporter。"

      # 该规则只能覆盖“Prometheus target scrape 异常但规则引擎仍在运行”的情况。
      # 如果 Prometheus 进程彻底退出，本机自监控无法自行发出告警，这是单机自监控的固有限制。
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus 自身抓取失败"
          description: "Prometheus 自身 target 连续 2 分钟不可用；若进程完全退出，需要外部监控补位。"
